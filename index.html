<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Tutorial Story2Action</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Fondo de la página forzado a gris claro */
        body {
            background-color: #f0f2f5 !important;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Área del celular: Siempre negra */
        .seccion-video {
            background-color: #000000 !important;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0 45px 0;
            position: relative;
        }

        .celular {
            width: 250px;
            height: 500px;
            background: #000;
            border-radius: 35px;
            overflow: hidden;
            border: 6px solid #222;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* AREA BLANCA: Aquí es donde aplicamos el blindaje */
        .seccion-texto {
            width: 100%;
            /* Usamos background-color e important para que no lo cambie */
            background-color: #ffffff !important; 
            background: #ffffff !important;
            padding: 40px 25px;
            border-radius: 30px 30px 0 0;
            margin-top: -30px;
            z-index: 100;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -15px 30px rgba(0,0,0,0.05);
        }

        /* Forzamos colores de texto específicos para que no se pongan blancos */
        .texto-paso {
            color: #FF2D7C !important;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 8px;
            display: block;
        }

        .titulo-paso {
            color: #111111 !important;
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .descripcion-paso {
            color: #333333 !important;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .boton-accion {
            background-color: #FF2D7C !important;
            color: #ffffff !important;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }

        /* UI Video */
        .progreso-contenedor {
            position: absolute;
            top: 15px; left: 15px; right: 15px;
            display: flex; gap: 4px; z-index: 10;
        }
        .barra { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
        .barra-llena { height: 100%; width: 0%; background: #FF2D7C; }
        .barra.activa .barra-llena { background: #FFD600; }
        .barra.completa .barra-llena { width: 100%; background: #FF2D7C; }

        .play-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center; z-index: 50;
        }
    </style>
</head>
<body style="background-color: #f0f2f5 !important;">

<div class="seccion-video">
    <div class="celular">
        <div class="play-overlay" id="overlay" onclick="iniciar()">
            <div style="color:white; text-align:center">
                <div style="font-size:40px">▶</div>
                <p style="font-family:'Syne'; font-size:10px; letter-spacing:1px">EMPEZAR</p>
            </div>
        </div>
        <div class="progreso-contenedor" id="barras"></div>
        <video id="vid" playsinline>
            <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
        </video>
    </div>
</div>

<div class="seccion-texto" style="background-color: #ffffff !important;">
    <span class="texto-paso" id="label">Paso 1 de 7</span>
    <h2 class="titulo-paso">
        <span id="emoji">📱</span>
        <span id="titulo" style="color: #111111 !important;">Notificación</span>
    </h2>
    <p class="descripcion-paso" id="desc" style="color: #333333 !important;">
        Recibís el pack del mes con todo el contenido directo en tu WhatsApp.
    </p>
    
    <button class="boton-accion" onclick="saltar()" id="btn" style="background-color: #FF2D7C !important; color: #ffffff !important;">
        Siguiente Paso →
    </button>
</div>

<script>
    const v = document.getElementById('vid');
    const steps = [
        { t: 0, title: "Notificación", desc: "Recibís el pack del mes con contenido listo para publicar por WhatsApp.", e: "📱" },
        { t: 8, title: "Selección", desc: "Entrás al link del pack y elegís el contenido de la semana.", e: "👆" },
        { t: 16, title: "El Gancho", desc: "Elegís la imagen o video que más se adapte a tu oferta del día.", e: "🧲" },
        { t: 24, title: "Preparación", desc: "Descargás el material y copiás tu enlace de venta personalizado.", e: "⬇️" },
        { t: 34, title: "Vinculación", desc: "Subís la historia a Instagram y pegás el enlace en el sticker de link.", e: "🔗" },
        { t: 48, title: "Publicación", desc: "¡Listo! Tu historia ya está trabajando para atraer clientes.", e: "📢" },
        { t: 58, title: "¡Venta!", desc: "El cliente ve tu historia y te escribe directo al WhatsApp para comprar.", e: "💰" }
    ];

    let current = 0;
    const cont = document.getElementById('barras');
    steps.forEach(() => {
        const d = document.createElement('div');
        d.className = 'barra'; d.innerHTML = '<div class="barra-llena"></div>';
        cont.appendChild(d);
    });

    function iniciar() { document.getElementById('overlay').style.display='none'; v.play(); }

    v.ontimeupdate = () => {
        const time = v.currentTime;
        const b = document.querySelectorAll('.barra');
        steps.forEach((s, i) => {
            const nextT = steps[i+1] ? steps[i+1].t : v.duration;
            const fill = b[i].querySelector('.barra-llena');
            if (time > s.t) {
                if (time < nextT) {
                    b[i].classList.add('activa');
                    fill.style.width = `${((time - s.t) / (nextT - s.t)) * 100}%`;
                    if (current !== i) { current = i; updateUI(); }
                } else {
                    b[i].classList.remove('activa');
                    b[i].classList.add('completa');
                    fill.style.width = '100%';
                }
            } else { b[i].classList.remove('activa', 'completa'); fill.style.width = '0%'; }
        });
    };

    function updateUI() {
        const s = steps[current];
        document.getElementById('label').innerText = `Paso ${current + 1} de ${steps.length}`;
        document.getElementById('emoji').innerText = s.e;
        document.getElementById('titulo').innerText = s.title;
        document.getElementById('desc').innerText = s.desc;
        const btn = document.getElementById('btn');
        if(current === steps.length - 1) {
            btn.innerText = "¡QUIERO EMPEZAR!";
            btn.style.setProperty('background-color', '#25D366', 'important');
        } else {
            btn.innerText = "Siguiente Paso →";
            btn.style.setProperty('background-color', '#FF2D7C', 'important');
        }
    }

    function saltar() {
        if (current < steps.length - 1) { v.currentTime = steps[current + 1].t; v.play(); }
    }
</script>
</body>
</html>
