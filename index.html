<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Story2Action</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
        }

        .phone-frame {
            position: relative;
            width: 380px;
            height: 800px;
            background: #000;
            border-radius: 44px;
            overflow: hidden;
            border: 8px solid #1a1a1a;
            box-shadow:
                0 0 0 1px #333,
                0 30px 80px rgba(0,0,0,0.8),
                inset 0 0 0 1px #111;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ─── BARRA DE PROGRESO SUPERIOR ─── */
        .progress-bar-container {
            position: absolute;
            top: 0; left: 0; right: 0;
            z-index: 20;
            padding: 18px 20px 12px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label .brand {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 800;
            color: #FF2D7C;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .progress-label .step-count {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
        }

        .progress-track {
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF2D7C, #FFD600);
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* Segmentos de progreso */
        .progress-dots {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .progress-dots span {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            transition: background 0.4s ease;
        }

        .progress-dots span.done {
            background: #FF2D7C;
        }

        .progress-dots span.current {
            background: #FFD600;
        }

        /* ─── OVERLAY OSCURO DE FONDO ─── */
        .dim-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            z-index: 8;
            transition: background 0.4s ease;
            pointer-events: none;
        }

        .dim-overlay.active {
            background: rgba(0, 0, 0, 0.55);
        }

        /* ─── CAJA DE PASO ─── */
        .step-card {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.92);
            width: calc(100% - 32px);
            background: rgba(12, 12, 12, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px 22px 20px;
            z-index: 15;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.45s ease, transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .step-card.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        /* Número grande de paso */
        .step-number {
            font-family: 'Syne', sans-serif;
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FF2D7C, #FFD600);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.25;
            position: absolute;
            top: 12px;
            right: 18px;
        }

        .step-icon-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .step-icon {
            font-size: 22px;
            line-height: 1;
        }

        .step-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.2px;
        }

        .step-card p {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.65);
            padding-right: 30px;
        }

        /* Línea de acento */
        .step-accent {
            width: 32px;
            height: 3px;
            border-radius: 2px;
            margin-bottom: 14px;
            margin-top: 4px;
        }

        /* ─── BOTÓN SIGUIENTE ─── */
        .btn-next {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 18px;
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, #FF2D7C, #c4005e);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 20px rgba(255, 45, 124, 0.35);
        }

        .btn-next:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(255, 45, 124, 0.5);
        }

        .btn-next:active {
            transform: scale(0.97);
        }

        .btn-next .arrow {
            font-size: 16px;
            transition: transform 0.2s ease;
        }

        .btn-next:hover .arrow {
            transform: translateX(3px);
        }

        /* Último paso: botón diferente */
        .btn-next.finish {
            background: linear-gradient(135deg, #25D366, #1aad50);
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.35);
        }

        /* ─── TEMPORIZADOR CIRCULAR ─── */
        .timer-ring {
            position: absolute;
            bottom: 18px;
            right: 18px;
            width: 36px;
            height: 36px;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .timer-ring.visible {
            opacity: 1;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
        }

        .timer-ring circle {
            fill: none;
            stroke: rgba(255,255,255,0.1);
            stroke-width: 3;
        }

        .timer-ring .progress-ring {
            stroke: #FFD600;
            stroke-linecap: round;
            stroke-dasharray: 88;
            stroke-dashoffset: 88;
            transition: stroke-dashoffset 0.1s linear;
        }

        .timer-ring .timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: #FFD600;
        }

        /* ─── INDICADOR DE PAUSA ─── */
        .pause-chip {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 214, 0, 0.15);
            border: 1px solid rgba(255, 214, 0, 0.3);
            color: #FFD600;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .pause-chip.show { opacity: 1; }

        /* ─── TOUCH TO START ─── */
        .touch-start {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            cursor: pointer;
        }

        .touch-start .logo {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
        }

        .touch-start .logo span {
            color: #FF2D7C;
        }

        .touch-start .play-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #FF2D7C, #FFD600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 40px rgba(255, 45, 124, 0.5);
            animation: pulse 2s infinite;
        }

        .touch-start p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,45,124,0.5); }
            50% { box-shadow: 0 0 50px rgba(255,45,124,0.8); }
        }

        .touch-start.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

<div class="phone-frame">

    <video id="video" muted playsinline loop>
        <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
    </video>

    <!-- Touch to start -->
    <div class="touch-start" id="touchStart">
        <div class="logo">Story<span>2</span>Action</div>
        <div class="play-btn">▶</div>
        <p>Tocá para ver el tutorial</p>
    </div>

    <!-- Barra de progreso -->
    <div class="progress-bar-container">
        <div class="progress-label">
            <span class="brand">S2A · Tutorial</span>
            <span class="step-count" id="stepCount">Paso 1 de 7</span>
        </div>
        <div class="progress-dots" id="progressDots">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>

    <!-- Overlay oscuro -->
    <div class="dim-overlay" id="dimOverlay"></div>

    <!-- Pausa chip -->
    <div class="pause-chip" id="pauseChip">⏸ Leyendo...</div>

    <!-- Timer ring -->
    <div class="timer-ring" id="timerRing">
        <svg width="36" height="36" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="14"/>
            <circle class="progress-ring" id="ringCircle" cx="18" cy="18" r="14"/>
        </svg>
        <div class="timer-text" id="timerText">5</div>
    </div>

    <!-- Tarjeta de paso (única, contenido dinámico) -->
    <div class="step-card" id="stepCard">
        <div class="step-number" id="cardNumber">1</div>
        <div class="step-icon-title">
            <span class="step-icon" id="cardIcon">📱</span>
            <h3 id="cardTitle">Notificación</h3>
        </div>
        <div class="step-accent" id="cardAccent"></div>
        <p id="cardDesc">Recibís el pack del mes directo en WhatsApp.</p>
        <button class="btn-next" id="btnNext">
            Siguiente paso <span class="arrow">→</span>
        </button>
    </div>

</div>

<script>
    const video = document.getElementById('video');
    const touchStart = document.getElementById('touchStart');
    const dimOverlay = document.getElementById('dimOverlay');
    const stepCard = document.getElementById('stepCard');
    const pauseChip = document.getElementById('pauseChip');
    const timerRing = document.getElementById('timerRing');
    const ringCircle = document.getElementById('ringCircle');
    const timerText = document.getElementById('timerText');
    const btnNext = document.getElementById('btnNext');
    const stepCountEl = document.getElementById('stepCount');
    const progressDots = document.getElementById('progressDots').querySelectorAll('span');

    // Datos de cada paso
    const steps = [
        {
            id: 1, icon: '📱', title: 'Notificación',
            desc: 'Recibís el pack del mes directo en WhatsApp con todo el contenido listo para publicar.',
            color: '#25D366', time: 0
        },
        {
            id: 2, icon: '👆', title: 'Selección',
            desc: 'Entrás al link del pack y seleccionás el contenido de la semana.',
            color: '#0088cc', time: 8
        },
        {
            id: 3, icon: '🛠', title: 'Herramientas',
            desc: 'Elegís la imagen o video "Gancho" que más se adapte a tu negocio.',
            color: '#FF9900', time: 16
        },
        {
            id: 4, icon: '⬇️', title: 'Preparación',
            desc: 'Descargás la imagen y copiás el enlace del micro-landing page.',
            color: '#FF2D7C', time: 24
        },
        {
            id: 5, icon: '🔗', title: 'Vinculación',
            desc: 'Subís la imagen a Instagram Stories y pegás el enlace en el sticker de link.',
            color: '#E1306C', time: 34
        },
        {
            id: 6, icon: '📢', title: 'Publicación',
            desc: 'Publicás tu historia. Está lista para atraer clientes y generar ventas.',
            color: '#833AB4', time: 48
        },
        {
            id: 7, icon: '💰', title: '¡Venta!',
            desc: 'El cliente hace clic en tu historia y te escribe directo por WhatsApp para comprar.',
            color: '#FFD600', time: 60
        }
    ];

    let currentStep = 0;
    let autoTimer = null;
    let countdown = 5;
    let countInterval = null;
    let isCardVisible = false;
    const PAUSE_DURATION = 5000;

    // ── Iniciar con toque ──
    touchStart.addEventListener('click', () => {
        touchStart.classList.add('hidden');
        video.play().catch(() => {});
        setTimeout(() => showStep(0), 800);
    });

    function updateProgress(index) {
        stepCountEl.textContent = `Paso ${index + 1} de 7`;
        progressDots.forEach((dot, i) => {
            dot.className = '';
            if (i < index) dot.classList.add('done');
            else if (i === index) dot.classList.add('current');
        });
    }

    function showStep(index) {
        if (index >= steps.length) {
            hideCard();
            return;
        }

        const step = steps[index];
        currentStep = index;

        // Actualizar contenido de la tarjeta
        document.getElementById('cardNumber').textContent = step.id;
        document.getElementById('cardIcon').textContent = step.icon;
        document.getElementById('cardTitle').textContent = step.title;
        document.getElementById('cardDesc').textContent = step.desc;
        document.getElementById('cardAccent').style.background = step.color;

        // Botón final
        if (index === steps.length - 1) {
            btnNext.innerHTML = '✅ ¡Entendido! <span class="arrow">→</span>';
            btnNext.classList.add('finish');
        } else {
            btnNext.innerHTML = 'Siguiente paso <span class="arrow">→</span>';
            btnNext.classList.remove('finish');
        }

        // Pausar video
        video.pause();
        pauseChip.classList.add('show');

        // Mostrar overlay y tarjeta
        dimOverlay.classList.add('active');
        stepCard.classList.add('active');
        isCardVisible = true;

        updateProgress(index);
        startCountdown();

        // Seek al timestamp del paso en el video
        if (steps[index].time !== undefined) {
            video.currentTime = steps[index].time;
        }
    }

    function hideCard() {
        stepCard.classList.remove('active');
        dimOverlay.classList.remove('active');
        pauseChip.classList.remove('show');
        timerRing.classList.remove('visible');
        isCardVisible = false;
        clearInterval(countInterval);
        clearTimeout(autoTimer);
        video.play().catch(() => {});
    }

    function startCountdown() {
        countdown = 5;
        timerText.textContent = countdown;
        const circumference = 88;
        ringCircle.style.strokeDashoffset = circumference;
        timerRing.classList.add('visible');

        clearInterval(countInterval);
        countInterval = setInterval(() => {
            countdown--;
            timerText.textContent = countdown;
            const offset = circumference - (circumference * (5 - countdown) / 5);
            ringCircle.style.strokeDashoffset = offset;
            if (countdown <= 0) {
                clearInterval(countInterval);
                timerRing.classList.remove('visible');
            }
        }, 1000);

        clearTimeout(autoTimer);
        autoTimer = setTimeout(() => {
            if (isCardVisible) {
                nextStep();
            }
        }, PAUSE_DURATION);
    }

    function nextStep() {
        clearTimeout(autoTimer);
        clearInterval(countInterval);
        const next = currentStep + 1;
        if (next < steps.length) {
            // Pequeña transición antes de mostrar el siguiente
            stepCard.classList.remove('active');
            setTimeout(() => showStep(next), 350);
        } else {
            hideCard();
        }
    }

    btnNext.addEventListener('click', () => {
        nextStep();
    });

    // Detección automática de pasos por tiempo (como fallback)
    video.addEventListener('timeupdate', () => {
        if (isCardVisible) return;
        const t = video.currentTime;
        for (let i = 0; i < steps.length; i++) {
            const next = steps[i + 1];
            const end = next ? next.time : 999;
            if (t >= steps[i].time && t < steps[i].time + 1.2 && currentStep !== i) {
                if (!isCardVisible) {
                    showStep(i);
                }
                break;
            }
        }
    });

    // Toque directo en video para pausar/reanudar (cuando no hay tarjeta activa)
    video.addEventListener('click', () => {
        if (!isCardVisible) {
            if (video.paused) video.play();
            else video.pause();
        }
    });
</script>

</body>
    </html>
