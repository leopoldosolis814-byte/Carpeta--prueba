<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story2Action - Explicativo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0057;
            --accent: #00ff88;
            --dark: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo del Video */
        video {
            height: 90vh;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 87, 0.3);
            border: 2px solid #333;
        }

        /* Capas de Texto */
        .overlay {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .step-text {
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* Flechas y Marcadores */
        .pointer {
            position: absolute;
            display: none;
            z-index: 11;
            color: var(--accent);
            font-size: 3rem;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        /* Barra de progreso visual */
        .progress-container {
            position: absolute;
            bottom: 20px;
            width: 60%;
            height: 6px;
            background: #333;
            border-radius: 10px;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        @media (max-width: 600px) {
            video { height: 100vh; border-radius: 0; border: none; }
            .step-text { font-size: 1rem; width: 90%; }
        }
    </style>
</head>
<body>

<div class="container">
    <video id="mainVideo" muted playsinline>
        <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div id="step1" class="step-text animate__animated">🚀 Recibí tu Pack del Mes por WhatsApp</div>
        <div id="step2" class="step-text animate__animated">🧠 Elegí creativos diseñados con IA para impactar</div>
        <div id="step3" class="step-text animate__animated">🔗 Copiá tu enlace de venta personalizado</div>
        <div id="step4" class="step-text animate__animated">📸 Subilo a Instagram y agregá el sticker</div>
        <div id="step5" class="step-text animate__animated">💰 ¡Listo! Recibí pedidos directo a tu WhatsApp</div>
    </div>

    <div id="arrow" class="pointer animate__animated animate__bounceIn">⬇️</div>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const progressBar = document.getElementById('progress-bar');
    const arrow = document.getElementById('arrow');

    // Configuración de los tiempos (en segundos)
    const script = [
        { start: 0, end: 4, id: 'step1', arrow: null },
        { start: 5, end: 12, id: 'step2', arrow: null },
        { start: 17, end: 23, id: 'step3', arrow: { top: '80%', left: '30%' } },
        { start: 35, end: 50, id: 'step4', arrow: { top: '45%', left: '50%' } },
        { start: 110, end: 132, id: 'step5', arrow: { top: '85%', left: '50%' } }
    ];

    video.addEventListener('timeupdate', () => {
        const currentTime = video.currentTime;
        
        // Actualizar barra de progreso
        const progress = (currentTime / video.duration) * 100;
        progressBar.style.width = progress + "%";

        // Lógica de textos y flechas
        script.forEach(step => {
            const el = document.getElementById(step.id);
            if (currentTime >= step.start && currentTime <= step.end) {
                if (el.style.display !== 'block') {
                    el.style.display = 'block';
                    el.classList.add('animate__fadeInUp');
                }
                
                // Mostrar flecha si existe posición definida
                if (step.arrow) {
                    arrow.style.display = 'block';
                    arrow.style.top = step.arrow.top;
                    arrow.style.left = step.arrow.left;
                } else {
                    arrow.style.display = 'none';
                }
            } else {
                if (el.style.display === 'block') {
                    el.classList.remove('animate__fadeInUp');
                    el.classList.add('animate__fadeOut');
                    setTimeout(() => { 
                        el.style.display = 'none'; 
                        el.classList.remove('animate__fadeOut');
                    }, 500);
                }
            }
        });
    });

    // Iniciar video al hacer click (por políticas de navegadores)
    document.body.addEventListener('click', () => {
        video.play();
    }, { once: true });

</script>

</body>
</html>
