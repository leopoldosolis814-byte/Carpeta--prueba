<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light only">
    <title>Tutorial Story2Action</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* VIDEO FULLSCREEN */
        video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 1;
        }

        /* BARRAS DE PROGRESO */
        .barras {
            position: fixed;
            top: 14px; left: 14px; right: 14px;
            display: flex; gap: 4px;
            z-index: 10;
        }

        .barra-seg {
            flex: 1; height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px; overflow: hidden;
        }

        .barra-relleno { height: 100%; width: 0%; background: #FF2D7C; transition: width 0.1s linear; }
        .barra-seg.activa .barra-relleno { background: #FFD600; }
        .barra-seg.completa .barra-relleno { width: 100% !important; background: #FF2D7C; }

        /* PLAY OVERLAY */
        .play-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; z-index: 20; cursor: pointer;
            opacity: 1; transition: opacity 0.4s;
        }

        .play-circle {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #FF2D7C, #FFD600);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: #fff;
            animation: pulso 2s infinite;
        }

        .play-overlay span {
            font-family: 'Syne', sans-serif;
            font-size: 11px; font-weight: 700;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px; text-transform: uppercase;
        }

        .play-overlay.oculto {
            opacity: 0; pointer-events: none;
        }

        @keyframes pulso {
            0%, 100% { box-shadow: 0 0 20px rgba(255,45,124,0.5); }
            50%       { box-shadow: 0 0 50px rgba(255,45,124,0.9); }
        }

        /* BURBUJA FLOTANTE */
        .burbuja {
            position: fixed;
            bottom: 16px;
            left: 16px; right: 16px;
            background: #ffffff;
            border-radius: 24px;
            padding: 12px 16px 12px;
            z-index: 15;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            animation: subir 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes subir {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: #fff0f5; border: 1.5px solid #FFD6E8;
            border-radius: 100px; padding: 4px 12px;
            font-size: 11px; font-weight: 700; color: #FF2D7C;
            font-family: 'Syne', sans-serif;
            margin-bottom: 6px;
        }

        .pill-dot {
            width: 6px; height: 6px; background: #FF2D7C;
            border-radius: 50%; animation: parpadeo 1.5s infinite;
        }

        @keyframes parpadeo {
            0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
        }

        .titulo {
            font-family: 'Syne', sans-serif;
            font-size: 18px; font-weight: 800; color: #111;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 4px; line-height: 1.2;
        }

        .linea {
            width: 32px; height: 4px; border-radius: 2px;
            margin-bottom: 6px;
        }

        .desc {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; line-height: 1.5; color: #555;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <video id="vid" playsinline muted loop>
        <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
    </video>

    <div class="barras" id="barras"></div>

    <div class="play-overlay" id="playOverlay">
        <div class="play-circle">▶</div>
        <span>Empezar tutorial</span>
    </div>

    <div class="burbuja" id="burbuja">
        <div class="pill">
            <span class="pill-dot"></span>
            <span id="labelPaso">Paso 1 de 7</span>
        </div>
        <div class="titulo">
            <span id="emoji">📱</span>
            <span id="titulo">Notificación</span>
        </div>
        <div class="linea" id="linea" style="background:#25D366"></div>
        <p class="desc" id="desc">
            Recibís el pack del mes con todo el contenido listo para publicar por WhatsApp.
        </p>
    </div>

<script>
    const vid = document.getElementById('vid');
    const playOverlay = document.getElementById('playOverlay');
    const burbuja = document.getElementById('burbuja');

    const pasos = [
        { t: 0,  e: '📱', titulo: 'Notificación', desc: 'Recibís el pack del mes con todo el contenido listo para publicar por WhatsApp.', color: '#25D366' },
        { t: 8,  e: '👆', titulo: 'Selección',    desc: 'Entrás al link del pack y elegís el contenido de la semana para tu negocio.', color: '#0088cc' },
        { t: 16, e: '🧲', titulo: 'El Gancho',    desc: 'Elegís la imagen o video que más se adapte a tu oferta del día.', color: '#FF9900' },
        { t: 24, e: '⬇️', titulo: 'Preparación', desc: 'Descargás el material y copiás tu enlace de venta personalizado del micro-landing.', color: '#FF2D7C' },
        { t: 34, e: '🔗', titulo: 'Vinculación',  desc: 'Subís la historia a Instagram y pegás el enlace en el sticker de link.', color: '#E1306C' },
        { t: 48, e: '📢', titulo: 'Publicación',  desc: '¡Listo! Tu historia ya está publicada y trabajando para atraer clientes.', color: '#833AB4' },
        { t: 58, e: '💰', titulo: '¡Venta!',      desc: 'El cliente ve tu historia, hace clic y te escribe directo al WhatsApp para comprar.', color: '#FFD600' },
    ];

    let actual = 0;

    // Crear barras dinámicamente
    const barrasCont = document.getElementById('barras');
    pasos.forEach(() => {
        const s = document.createElement('div');
        s.className = 'barra-seg';
        s.innerHTML = '<div class="barra-relleno"></div>';
        barrasCont.appendChild(s);
    });

    function actualizarPanel(i) {
        const p = pasos[i];
        
        // Animación simple de salida/entrada de texto
        burbuja.style.opacity = 0.5;
        
        setTimeout(() => {
            document.getElementById('labelPaso').textContent = `Paso ${i + 1} de ${pasos.length}`;
            document.getElementById('emoji').textContent = p.e;
            document.getElementById('titulo').textContent = p.titulo;
            document.getElementById('desc').textContent = p.desc;
            document.getElementById('linea').style.background = p.color;
            burbuja.style.opacity = 1;
        }, 100);
    }

    // Evento para iniciar el video
    playOverlay.addEventListener('click', () => {
        playOverlay.classList.add('oculto');
        vid.play();
    });

    vid.addEventListener('timeupdate', () => {
        const t = vid.currentTime;
        const barras = document.querySelectorAll('.barra-seg');
        
        pasos.forEach((p, i) => {
            const nextT = pasos[i + 1] ? pasos[i + 1].t : vid.duration;
            const relleno = barras[i].querySelector('.barra-relleno');
            
            barras[i].classList.remove('activa', 'completa');
            
            if (t >= nextT && nextT !== 0) {
                barras[i].classList.add('completa');
                relleno.style.width = '100%';
            } else if (t >= p.t) {
                barras[i].classList.add('activa');
                let progreso = ((t - p.t) / (nextT - p.t) * 100);
                relleno.style.width = progreso + '%';
                
                if (actual !== i) { 
                    actual = i; 
                    actualizarPanel(i); 
                }
            } else {
                relleno.style.width = '0%';
            }
        });
    });

    // Intentar play automático (silenciado suele funcionar)
    window.addEventListener('load', () => {
        actualizarPanel(0);
        vid.play().then(() => {
            playOverlay.classList.add('oculto');
        }).catch(() => {
            // Si el navegador bloquea el autoplay, el overlay queda visible para que el usuario haga click
            console.log("Autoplay bloqueado, esperando interacción.");
        });
    });
</script>
</body>
</html>
