<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story2Action Tutorial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: white;
        }

        .phone-frame {
            position: relative;
            width: 360px;
            height: 740px;
            background: #000;
            border-radius: 40px;
            overflow: hidden;
            border: 10px solid #1a1a1a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BARRA DE PROGRESO */
        .header-ui {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 25px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 30;
        }

        .progress-segments {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .segment {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .segment-fill {
            height: 100%;
            width: 0%;
            background: #FF2D7C;
            transition: width 0.1s linear;
        }

        .segment.active .segment-fill { background: #FFD600; }
        .segment.complete .segment-fill { width: 100%; background: #FF2D7C; }

        /* TARJETA DE PASO (TIPO OVERLAY INFERIOR) */
        .step-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 30px 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 70%, transparent);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
            z-index: 40;
        }

        .step-overlay.active { transform: translateY(0); }

        .step-tag {
            display: inline-block;
            padding: 4px 10px;
            background: #FF2D7C;
            border-radius: 6px;
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .step-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .step-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
        }

        /* CONTROLES */
        .controls {
            position: absolute;
            top: 50%; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            z-index: 25;
            pointer-events: none;
        }

        .nav-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: all;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .phone-frame:hover .nav-btn { opacity: 1; }

        /* PANTALLA INICIAL */
        .welcome-screen {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .play-trigger {
            width: 80px;
            height: 80px;
            background: #FF2D7C;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 45, 124, 0.4);
        }

    </style>
</head>
<body>

<div class="phone-frame">
    <div class="welcome-screen" id="welcome">
        <div class="play-trigger" onclick="startTutorial()">▶</div>
        <h2 style="font-family:'Syne'">Story2Action</h2>
        <p style="font-size: 14px; opacity: 0.6; margin-top: 10px">Mirá cómo vender más en 60 segundos</p>
    </div>

    <div class="header-ui">
        <div class="progress-segments" id="progressSegments"></div>
        <div style="font-size: 10px; opacity: 0.5; font-weight: bold; letter-spacing: 1px" id="stepIndicator">PASO 1 / 7</div>
    </div>

    <video id="tutoVideo" playsinline>
        <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
    </video>

    <div class="step-overlay" id="stepOverlay">
        <div class="step-tag" id="stepTag">Paso 1</div>
        <div class="step-title"><span id="stepEmoji">📱</span> <span id="stepTitle">Notificación</span></div>
        <p class="step-desc" id="stepDesc">Recibís el pack del mes directo en WhatsApp.</p>
    </div>

    <div class="controls">
        <button class="nav-btn" onclick="prevStep()">⇠</button>
        <button class="nav-btn" onclick="nextStep()">⇢</button>
    </div>
</div>

<script>
    const video = document.getElementById('tutoVideo');
    const steps = [
        { time: 0, title: "Notificación", desc: "Recibís el pack del mes con contenido listo para publicar.", emoji: "📱" },
        { time: 8, title: "Selección", desc: "Entrás al link y elegís el contenido de la semana.", emoji: "👆" },
        { time: 16, title: "Gancho", desc: "Elegís la imagen o video que más se adapte a tu negocio.", emoji: "🧲" },
        { time: 24, title: "Preparación", desc: "Descargás el material y copiás tu link de venta.", emoji: "⬇️" },
        { time: 34, title: "Vinculación", desc: "Subís la historia a Instagram y pegás el enlace.", emoji: "🔗" },
        { time: 48, title: "Publicación", desc: "¡Listo! Tu historia ya está trabajando por vos.", emoji: "📢" },
        { time: 58, title: "Conversión", desc: "El cliente te escribe directo al WhatsApp para comprar.", emoji: "💰" }
    ];

    let currentStep = 0;

    // Crear segmentos de progreso
    const segmentsContainer = document.getElementById('progressSegments');
    steps.forEach(() => {
        const div = document.createElement('div');
        div.className = 'segment';
        div.innerHTML = '<div class="segment-fill"></div>';
        segmentsContainer.appendChild(div);
    });

    function startTutorial() {
        document.getElementById('welcome').style.display = 'none';
        video.play();
        updateUI();
    }

    video.ontimeupdate = () => {
        const time = video.currentTime;
        
        // Actualizar barra de progreso visual
        const segments = document.querySelectorAll('.segment');
        steps.forEach((step, i) => {
            const nextStepTime = steps[i+1] ? steps[i+1].time : video.duration;
            const fill = segments[i].querySelector('.segment-fill');
            
            if (time > step.time) {
                if (time < nextStepTime) {
                    segments[i].classList.add('active');
                    const progress = ((time - step.time) / (nextStepTime - step.time)) * 100;
                    fill.style.width = `${progress}%`;
                    if (currentStep !== i) {
                        currentStep = i;
                        updateUI();
                    }
                } else {
                    segments[i].classList.remove('active');
                    segments[i].classList.add('complete');
                    fill.style.width = '100%';
                }
            } else {
                segments[i].classList.remove('active', 'complete');
                fill.style.width = '0%';
            }
        });
    };

    function updateUI() {
        const step = steps[currentStep];
        const overlay = document.getElementById('stepOverlay');
        
        // Animación de salida y entrada de texto
        overlay.classList.remove('active');
        
        setTimeout(() => {
            document.getElementById('stepTag').innerText = `Paso ${currentStep + 1}`;
            document.getElementById('stepEmoji').innerText = step.emoji;
            document.getElementById('stepTitle').innerText = step.title;
            document.getElementById('stepDesc').innerText = step.desc;
            document.getElementById('stepIndicator').innerText = `PASO ${currentStep + 1} / ${steps.length}`;
            overlay.classList.add('active');
        }, 300);
    }

    function nextStep() {
        if (currentStep < steps.length - 1) {
            video.currentTime = steps[currentStep + 1].time;
        }
    }

    function prevStep() {
        if (currentStep > 0) {
            video.currentTime = steps[currentStep - 1].time;
        } else {
            video.currentTime = 0;
        }
    }
</script>

</body>
</html>
