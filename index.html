<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story2Action Tutorial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f8f9fa; /* Fondo general claro */
            font-family: 'DM Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CONTENEDOR DEL CELULAR */
        .phone-section {
            background: #111; /* Contraste para que resalte el celular */
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 0;
            position: relative;
        }

        .phone-frame {
            position: relative;
            width: 280px; /* Tamaño reducido para que no ocupe toda la pantalla */
            height: 560px;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            border: 8px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BARRA DE PROGRESO (Sobre el video) */
        .header-ui {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 10;
        }

        .progress-segments {
            display: flex;
            gap: 4px;
        }

        .segment {
            flex: 1;
            height: 2px;
            background: rgba(255,255,255,0.3);
            border-radius: 1px;
            overflow: hidden;
        }

        .segment-fill {
            height: 100%;
            width: 0%;
            background: #FF2D7C;
        }

        .segment.active .segment-fill { background: #FFD600; }
        .segment.complete .segment-fill { width: 100%; background: #FF2D7C; }

        /* ZONA EXPLICATIVA (Abajo, fondo claro) */
        .info-section {
            width: 100%;
            max-width: 380px;
            padding: 30px 20px;
            background: #ffffff;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 30px 30px 0 0;
            margin-top: -20px; /* Sube un poco para "abrazar" la sección oscura */
            z-index: 20;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }

        .step-tag {
            display: inline-block;
            color: #FF2D7C;
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .step-title {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* BOTÓN DE ACCIÓN / PLAY */
        .btn-main {
            background: #FF2D7C;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }

        .btn-main:active { transform: scale(0.98); }

        /* Pantalla de inicio */
        .welcome-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="phone-section">
    <div class="phone-frame">
        <div class="welcome-overlay" id="welcome" onclick="startTutorial()">
            <div style="text-align:center; color:white">
                <div style="font-size:40px; margin-bottom:10px">▶</div>
                <p style="font-family:'Syne'; font-size:12px">TOCÁ PARA EMPEZAR</p>
            </div>
        </div>

        <div class="header-ui">
            <div class="progress-segments" id="progressSegments"></div>
        </div>

        <video id="tutoVideo" playsinline>
            <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
        </video>
    </div>
</div>

<div class="info-section">
    <span class="step-tag" id="stepTag">Paso 1</span>
    <h2 class="step-title">
        <span id="stepEmoji">📱</span>
        <span id="stepTitle">Notificación</span>
    </h2>
    <p class="step-desc" id="stepDesc">
        Recibís el pack del mes directo en tu WhatsApp con todo listo.
    </p>
    
    <button class="btn-main" onclick="nextStep()" id="btnNext">Siguiente Paso →</button>
</div>

<script>
    const video = document.getElementById('tutoVideo');
    const steps = [
        { time: 0, title: "Notificación", desc: "Recibís el pack del mes con contenido listo para publicar por WhatsApp.", emoji: "📱" },
        { time: 8, title: "Selección", desc: "Entrás al link del pack y elegís el contenido de la semana.", emoji: "👆" },
        { time: 16, title: "El Gancho", desc: "Elegís la imagen o video que más se adapte a tu oferta.", emoji: "🧲" },
        { time: 24, title: "Preparación", desc: "Descargás el material y copiás tu micro-landing de venta.", emoji: "⬇️" },
        { time: 34, title: "Vinculación", desc: "Subís la historia a Instagram y pegás el enlace en el sticker.", emoji: "🔗" },
        { time: 48, title: "Publicación", desc: "Tu historia ya está en línea atrayendo posibles clientes.", emoji: "📢" },
        { time: 58, title: "Conversión", desc: "El cliente ve tu promo y te escribe directo al WhatsApp para comprar.", emoji: "💰" }
    ];

    let currentStep = 0;

    // Generar barritas de progreso
    const segmentsContainer = document.getElementById('progressSegments');
    steps.forEach(() => {
        const div = document.createElement('div');
        div.className = 'segment';
        div.innerHTML = '<div class="segment-fill"></div>';
        segmentsContainer.appendChild(div);
    });

    function startTutorial() {
        document.getElementById('welcome').style.display = 'none';
        video.play();
    }

    video.ontimeupdate = () => {
        const time = video.currentTime;
        const segments = document.querySelectorAll('.segment');
        
        steps.forEach((step, i) => {
            const nextTime = steps[i+1] ? steps[i+1].time : video.duration;
            const fill = segments[i].querySelector('.segment-fill');
            
            if (time > step.time) {
                if (time < nextTime) {
                    segments[i].classList.add('active');
                    const progress = ((time - step.time) / (nextTime - step.time)) * 100;
                    fill.style.width = `${progress}%`;
                    if (currentStep !== i) {
                        currentStep = i;
                        updateUI();
                    }
                } else {
                    segments[i].classList.remove('active');
                    segments[i].classList.add('complete');
                    fill.style.width = '100%';
                }
            } else {
                segments[i].classList.remove('active', 'complete');
                fill.style.width = '0%';
            }
        });
    };

    function updateUI() {
        const step = steps[currentStep];
        document.getElementById('stepTag').innerText = `Paso ${currentStep + 1} de ${steps.length}`;
        document.getElementById('stepEmoji').innerText = step.emoji;
        document.getElementById('stepTitle').innerText = step.title;
        document.getElementById('stepDesc').innerText = step.desc;
        
        const btn = document.getElementById('btnNext');
        if(currentStep === steps.length - 1) {
            btn.innerText = "¡Empezar ahora!";
            btn.style.background = "#25D366"; // Color WhatsApp
        } else {
            btn.innerText = "Siguiente Paso →";
            btn.style.background = "#FF2D7C";
        }
    }

    function nextStep() {
        if (currentStep < steps.length - 1) {
            video.currentTime = steps[currentStep + 1].time;
            video.play();
        } else {
            alert("¡Redirigiendo al servicio!");
        }
    }
</script>

</body>
</html>
