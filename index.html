<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial Story2Action Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }

        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            background: #000;
        }

        video {
            height: 100%;
            width: auto;
            max-width: 100%;
            filter: brightness(0.8); /* Oscurece un poco el video para que resalten los textos */
        }

        /* TEXTO EXPLICATIVO (GLASSMORPHISM) */
        .instruction-overlay {
            position: absolute;
            top: 10%;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .instruction-overlay.active {
            opacity: 1;
            transform: scale(1);
        }

        .instruction-overlay h2 {
            font-size: 14px;
            color: #ff3e3e;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .instruction-overlay p {
            font-size: 16px;
            line-height: 1.4;
            font-weight: 400;
        }

        /* FLECHA ROJA ANIMADA */
        .arrow-indicator {
            position: absolute;
            font-size: 50px;
            color: #ff3e3e;
            display: none;
            z-index: 200;
            filter: drop-shadow(0 0 15px rgba(255, 62, 62, 0.8));
            animation: pointAction 0.6s infinite alternate;
        }

        @keyframes pointAction {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-15px) scale(1.1); }
        }

        /* CONTROLES */
        .mute-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 300;
        }

        .progress-line {
            position: absolute;
            top: 0;
            left: 0;
            height: 5px;
            background: #ff3e3e;
            width: 0%;
            z-index: 400;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-line" id="bar"></div>
    
    <video id="tutorial" muted playsinline loop>
        <source src="https://res.cloudinary.com/ds2udm1nc/video/upload/v1775641154/XRecorder_20260408_01_3_erklpv.mp4" type="video/mp4">
    </video>

    <div id="text-box" class="instruction-overlay">
        <h2 id="step-title">Paso 1</h2>
        <p id="step-desc">Iniciando tutorial...</p>
    </div>

    <div id="arrow" class="arrow-indicator">📍</div>

    <div class="mute-btn" onclick="toggleAudio()">🔇</div>
</div>

<script>
    const v = document.getElementById('tutorial');
    const box = document.getElementById('text-box');
    const title = document.getElementById('step-title');
    const desc = document.getElementById('step-desc');
    const arrow = document.getElementById('arrow');
    const bar = document.getElementById('bar');

    // VELOCIDAD MUCHO MÁS LENTA (0.45 es menos de la mitad de velocidad)
    v.playbackRate = 0.45;

    function toggleAudio() {
        v.muted = !v.muted;
        document.querySelector('.mute-btn').innerText = v.muted ? '🔇' : '🔊';
    }

    const script = [
        { time: 0, title: "El Inicio", desc: "Recibís el catálogo premium por WhatsApp todos los meses.", arrow: null },
        { time: 8, title: "Selección IA", desc: "Elegí imágenes creadas con IA para captar toda la atención.", arrow: null },
        { time: 18, title: "Enlace de Venta", desc: "Hacé clic en el botón naranja para copiar tu link de pedido.", arrow: { top: '80%', left: '35%', icon: '👈' } },
        { time: 35, title: "Instagram", desc: "Subí la imagen a tus historias de Instagram.", arrow: null },
        { time: 48, title: "Vincular pedido", desc: "Buscá el sticker de 'Enlace' y pegá lo que copiaste.", arrow: { top: '45%', left: '50%', icon: '👇' } },
        { time: 105, title: "Venta Directa", desc: "El cliente ve tu oferta y te escribe directo al WhatsApp.", arrow: { top: '85%', left: '50%', icon: '☝️' } }
    ];

    v.addEventListener('timeupdate', () => {
        const currentTime = v.currentTime;
        bar.style.width = (currentTime / v.duration) * 100 + "%";

        let currentStep = null;
        for (let i = script.length - 1; i >= 0; i--) {
            if (currentTime >= script[i].time) {
                currentStep = script[i];
                break;
            }
        }

        if (currentStep) {
            title.innerText = currentStep.title;
            desc.innerText = currentStep.desc;
            box.classList.add('active');

            if (currentStep.arrow) {
                arrow.style.display = 'block';
                arrow.style.top = currentStep.arrow.top;
                arrow.style.left = currentStep.arrow.left;
                arrow.innerText = currentStep.arrow.icon;
            } else {
                arrow.style.display = 'none';
            }
        }
    });

    // Forzar inicio en móviles
    window.addEventListener('touchstart', () => v.play(), {once: true});
    window.addEventListener('load', () => v.play());
</script>

</body>
</html>
